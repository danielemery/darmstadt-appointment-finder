name: Verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v7

      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Install dependencies
        run: nix develop .#ci --command npm ci

      - name: Verify
        run: nix develop .#ci --command npm run verify
